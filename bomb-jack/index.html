<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Jack</title>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
        .header {
            background:#111; color:white; padding:10px 15px; 
            display:flex; align-items:center; justify-content:space-between;
        }
        button { 
            background:#00ccff; color:black; border:none; padding:8px 16px; 
            border-radius:6px; cursor:pointer; font-size:16px;
        }
        /* Changed to target the container class/id EmulatorJS will look for */
        #game-container { width:100%; height:calc(100vh - 56px); }
        .status { padding:5px; text-align:center; background:#222; color:#0f0; font-size:14px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="window.location.href='../'">← Back</button>
        <h2>Bomb Jack</h2>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
    <div class="status" id="status">Loading game...</div>
    
    <div id="game-container"></div>

    <script>
        const statusEl = document.getElementById('status');

        // 1. Declare configurations
        EJS_player = '#game-container'; // Explicitly directs the loader where to construct the emulator
        EJS_mainURL = "https://sirmayorcharlie.github.io/SirMayorC-Bookmarks/stable/";
        EJS_core = "arcade";
        EJS_gameUrl = "https://www.emulatorjs.com/api/fba?name=bombjack.zip";
        EJS_startButton = true;
        EJS_pathtodata = "https://sirmayorcharlie.github.io/SirMayorC-Bookmarks/stable/data/";

        function toggleFullscreen() {
            const elem = document.getElementById('game-container');
            if (!document.fullscreenElement) elem.requestFullscreen();
            else document.exitFullscreen();
        }

        window.addEventListener('message', (e) => {
            if (e.data && e.data.act === 'ejs-game-started') {
                statusEl.style.display = 'none';
            }
        });
    </script>
    
    <script src="https://sirmayorcharlie.github.io/SirMayorC-Bookmarks/stable/data/loader.js"></script>
</body>
</html>
