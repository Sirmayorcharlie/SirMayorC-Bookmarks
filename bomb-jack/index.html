<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Jack</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .header {
            background: #111;
            padding: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn {
            background: #00ccff;
            color: #000;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        #game {
            width: 100%;
            height: calc(100vh - 56px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">← Back to Bookmarks</button>
        <h2>Bomb Jack</h2>
        <button class="back-btn" onclick="toggleFullscreen()">Fullscreen</button>
    </div>
    
    <iframe id="game" src="https://www.retrogames.cc/embed/7982-bomb-jack-set-1.html" allowfullscreen></iframe>

    <script>
        function toggleFullscreen() {
            const elem = document.getElementById('game');
            if (!document.fullscreenElement) {
                elem.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
