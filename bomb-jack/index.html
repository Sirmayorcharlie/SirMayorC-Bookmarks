<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bomb Jack</title>
    <style>
        body, html { margin:0; padding:0; height:100%; background:#000; overflow:hidden; }
        .header {
            background:#111; color:white; padding:10px 15px; 
            display:flex; align-items:center; justify-content:space-between;
        }
        button { 
            background:#00ccff; color:black; border:none; padding:8px 16px; 
            border-radius:6px; cursor:pointer; font-size:16px;
        }
        #game { width:100%; height:calc(100vh - 56px); border:none; }
        .status { padding:5px; text-align:center; background:#222; color:#0f0; font-size:14px; }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="window.location.href='../'">← Back</button>
        <h2>Bomb Jack <small>v1.3</small></h2>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>
    <div class="status" id="status">Loading game...</div>
    <iframe id="game" allowfullscreen></iframe>

   <script>
        const statusEl = document.getElementById('status');

        EJS_mainURL = "https://sirmayorcharlie.github.io/SirMayorC-Bookmarks/stable/";
        EJS_core = "arcade";
        EJS_gameUrl = "https://www.emulatorjs.com/api/fba?name=bombjack.zip";
        EJS_startButton = true;
        EJS_pathtodata = "https://sirmayorcharlie.github.io/SirMayorC-Bookmarks/stable/";

        function toggleFullscreen() {
            const elem = document.getElementById('game');
            if (!document.fullscreenElement) elem.requestFullscreen();
            else document.exitFullscreen();
        }

        // Show status updates
        window.addEventListener('message', (e) => {
            if (e.data && e.data.act === 'ejs-game-started') {
                statusEl.style.display = 'none';
            }
        });
    </script>

    <script src="https://sirmayorcharlie.github.io/SirMayorC-Bookmarks/stable/data/loader.js"></script>
</body>
</html>
